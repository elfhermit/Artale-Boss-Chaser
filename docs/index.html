<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boss 獵人儀表板 (Pro)</title>
    <meta name="description" content="Artale Boss Chaser - 追蹤 Boss 重生時間的最佳工具">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="dark-mode">
    <div class="app-container">

        <!-- Main Content -->
        <main class="main-content">
            <header class="main-header">
                <h1>Artale Boss Chaser <span class="badge">PRO</span></h1>
                <div class="header-actions">
                    <div class="secondary-header-actions">
                        <button class="feature-btn" id="view-mode-btn" title="切換檢視模式">
                            <span class="material-icons-outlined" id="view-mode-icon">grid_view</span>
                        </button>
                        <button class="feature-btn" id="sound-toggle-btn" title="切換音效提示">
                            <span class="material-icons-outlined" id="sound-toggle-icon">volume_off</span>
                        </button>
                    </div>
                    <button class="icon-btn" id="theme-toggle-btn" title="切換主題">
                        <span class="material-icons-outlined" id="theme-icon">dark_mode</span>
                    </button>
                </div>
            </header>

            <!-- ===== Tab Panel: Boss 列表 ===== -->
            <div class="tab-panel active" id="panel-bosses" data-panel="bosses">
                <!-- Search & Filter -->
                <div class="filter-bar">
                    <!-- Boss 下拉快速選擇框 (合併 PC/Mobile) -->
                    <div class="boss-quick-select-wrapper" style="margin-bottom: 8px;">
                        <select id="boss-selector-dropdown" class="boss-selector-dropdown boss-selector-large" style="width: 100%;">
                            <option value="">🔍 快速選擇/搜尋 Boss...</option>
                        </select>
                    </div>
                    <!-- 常用 Boss 區塊 (合併 PC/Mobile) -->
                    <div class="fav-section" id="fav-section">
                        <div class="fav-section-header">
                            <span class="material-icons-outlined" style="font-size:15px; color:var(--color-warning)">star</span>
                            <span>常用 Boss</span>
                        </div>
                        <div id="fav-chips-container" class="fav-chips-container">
                            <span class="fav-placeholder">點 Boss 卡片上的 ☆ 可加入常用</span>
                        </div>
                    </div>
                    <div class="filter-controls-row" style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px;">
                        <div class="search-box">
                            <span class="material-icons-outlined">search</span>
                            <input type="text" id="boss-search-input" placeholder="在卡片列表中搜尋 (例如: 蘑菇王)...">
                        </div>
                        <div class="smart-sort-btn" id="smart-sort-btn" title="優先顯示即將重生的 Boss" style="white-space: nowrap;">
                            <span class="material-icons-outlined" style="font-size:16px">sort</span> 智慧排序
                        </div>
                    </div>
                    <div class="filter-chips">
                        <div class="chip active" data-filter="all" id="filter-chip-all">全部</div>
                        <div class="chip" data-filter="alive" id="filter-chip-alive">🟢 可擊殺</div>
                        <div class="chip" data-filter="warning" id="filter-chip-warning">🟡 即將重生</div>
                        <div class="chip" data-filter="cooldown" id="filter-chip-cooldown">🔴 冷卻中</div>
                    </div>
                </div>

                <!-- Boss Monitoring List -->
                <section class="boss-list" id="boss-monitoring-list">
                    <!-- Boss Cards will be injected here via JS -->
                </section>
            </div>

            <!-- ===== Tab Panel: 歷史紀錄 ===== -->
            <div class="tab-panel" id="panel-history" data-panel="history">
                <!-- Kill History Table -->
                <section class="history-section" id="kill-history-section">
                    <div class="section-header">
                        <h2 id="history-table-title">各頻道狀態紀錄</h2>
                        <div style="display:flex; gap:8px; flex-wrap:wrap;">
                            <button class="btn btn-secondary btn-small" id="share-status-btn">
                                <span class="material-icons-outlined" style="font-size:15px">share</span> 分享狀態
                            </button>
                            <button class="btn btn-danger btn-small" id="clear-history-btn">清空所有紀錄</button>
                        </div>
                    </div>
                    <div class="table-container">
                        <table id="kill-history-table">
                            <thead>
                                <tr>
                                    <th class="sortable" data-sort="name">Boss <span class="sort-icon"></span></th>
                                    <th class="sortable" data-sort="killTime">擊殺時間 <span class="sort-icon">▼</span></th>
                                    <th class="sortable" data-sort="channel">頻道 <span class="sort-icon"></span></th>
                                    <th class="sortable" data-sort="hasDrop">掉寶 <span class="sort-icon"></span></th>
                                    <th>備註</th>
                                    <th class="sortable" data-sort="respawn">預計重生 <span class="sort-icon"></span></th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- Rows injected via JS -->
                            </tbody>
                        </table>
                    </div>
                    <div id="history-pagination" class="pagination-controls"></div>
                </section>
            </div>
        </main>

    </div>

    <!-- ===== Sticky Action Bar (Unified Target Lock for PC/Mobile) ===== -->
    <div id="action-bar" class="action-bar" style="display: none;">
        <div class="action-bar-inner">
            <div class="action-bar-header">
                <div class="target-boss-info">
                    <div id="action-target-img" class="boss-card-img mini-img"></div>
                    <div class="action-target-text">
                        <h2 id="action-target-name">Boss Name</h2>
                        <p id="action-target-respawn" style="margin: 0; font-size: 0.8rem; color: var(--color-text-secondary);">Respawn info</p>
                    </div>
                </div>
                <div class="action-bar-controls">
                    <button id="action-share-btn" class="btn-icon" title="分享此 Boss">
                        <span class="material-icons-outlined">share</span>
                    </button>
                    <button id="action-unlock-btn" class="btn-icon" title="取消鎖定">
                        <span class="material-icons-outlined">close</span>
                    </button>
                </div>
            </div>
            
            <div class="action-bar-body">
                <!-- Channel Input -->
                <div class="action-channel-group">
                    <button type="button" class="btn-icon circle-btn" id="action-ch-sub"><span class="material-icons-outlined">remove</span></button>
                    <input type="number" id="action-channel-input" class="action-channel-input" 
                           min="1" max="3000" placeholder="Ch." inputmode="numeric" pattern="[0-9]*">
                    <button type="button" class="btn-icon circle-btn" id="action-ch-add"><span class="material-icons-outlined">add</span></button>
                </div>
                
                <!-- Drops Settings -->
                <div class="action-drops-group">
                    <label class="drop-chip mini-chip" title="掉落裝備">
                        <input type="checkbox" id="action-drop-equip">
                        <span class="chip-content"><span class="material-icons-outlined">shield</span> 裝備</span>
                    </label>
                    <label class="drop-chip mini-chip" title="掉落卷軸">
                        <input type="checkbox" id="action-drop-scroll">
                        <span class="chip-content"><span class="material-icons-outlined">description</span> 卷軸</span>
                    </label>
                    <label class="drop-chip mini-chip star-chip" title="大寶物/幸運頻道">
                        <input type="checkbox" id="action-drop-star">
                        <span class="chip-content"><span class="material-icons-outlined">stars</span> 星星</span>
                    </label>
                </div>

                <!-- Submit Button -->
                <div class="action-submit-group">
                    <button type="button" id="action-submit-btn" class="btn btn-primary btn-action">
                        <span class="material-icons-outlined">bolt</span> 紀錄
                    </button>
                    <label class="auto-inc-mini" title="紀錄後自動跳轉下一頻道">
                        <input type="checkbox" id="action-auto-inc" checked> 自動+1
                    </label>
                </div>
            </div>

            <!-- Target Boss Recent History Mini List -->
            <div class="action-history-wrapper">
                <div id="action-history-list" class="action-history-list">
                    <!-- Recent kills for THIS boss will be shown here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation (Mobile - Only 2 Tabs) -->
    <nav class="bottom-nav" id="bottom-nav">
        <button class="bottom-nav-btn active" data-tab="bosses" id="tab-btn-bosses">
            <span class="material-icons-outlined">grid_view</span>
            <span class="bottom-nav-label">Boss 列表</span>
        </button>
        <button class="bottom-nav-btn" data-tab="history" id="tab-btn-history">
            <span class="material-icons-outlined">history</span>
            <span class="bottom-nav-label">歷史紀錄</span>
        </button>
    </nav>

    <!-- Toast container for non-blocking messages / undo -->
    <div id="toast-container" aria-live="polite" style="position:fixed; right:16px; bottom:80px; z-index:1000;"></div>

    <!-- 分享 Modal -->
    <div id="share-modal" class="modal-overlay" style="display:none;">
        <div class="modal-panel">
            <div class="modal-header">
                <h3><span class="material-icons-outlined" style="vertical-align:middle; margin-right:6px;">share</span>快速分享 Boss 狀態</h3>
                <button id="share-modal-close" class="btn-icon" title="關閉">
                    <span class="material-icons-outlined">close</span>
                </button>
            </div>
            <div class="modal-body">
                <div class="share-options">
                    <div class="share-format-selector">
                        <label class="input-label">分享格式</label>
                        <div class="drop-type-selector">
                            <label class="drop-chip">
                                <input type="radio" name="share-format" value="simple" checked>
                                <span class="chip-content">精簡模式</span>
                            </label>
                            <label class="drop-chip">
                                <input type="radio" name="share-format" value="detailed">
                                <span class="chip-content">詳細模式</span>
                            </label>
                        </div>
                    </div>
                    <div class="share-boss-selector">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                            <label class="input-label" style="margin: 0;">選擇要分享的 Boss</label>
                            <button type="button" id="share-select-all-btn" class="btn btn-secondary btn-small">全選 / 全不選</button>
                        </div>
                        <div id="share-boss-list" class="share-boss-list">
                            <!-- Checkboxes injected via JS -->
                        </div>
                    </div>
                </div>
                <label class="input-label" style="margin-top: 16px;">預覽</label>
                <pre id="share-text-content" class="share-text-pre"></pre>
            </div>
            <div class="modal-actions">
                <button id="share-native-btn" class="btn btn-secondary" style="display: none;">
                    <span class="material-icons-outlined" style="font-size:16px">ios_share</span> 系統分享
                </button>
                <button id="share-copy-btn" class="btn btn-primary">
                    <span class="material-icons-outlined" style="font-size:16px">content_copy</span> 複製到剪貼簿
                </button>
                <button id="share-close-btn2" class="btn btn-secondary">關閉</button>
            </div>
        </div>
    </div>

    <!-- 引入 JavaScript (Sequential Loading for file:// compatibility) -->
    <script src="js/namespace.js"></script>
    <script src="js/data/bosses.js"></script>
    <script src="js/core/utils.js"></script>
    <script src="js/core/state.js"></script>
    <script src="js/ui/dom.js"></script>
    <script src="js/ui/render.js"></script>
    <script src="js/logic/actions.js"></script>
    <script src="js/ui/events.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
